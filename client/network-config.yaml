# network-config.yaml
name: my-besu-network
description: Hyperledger Besu network for Academic Credentials
version: "2.0"

# ADD THIS NEW SECTION
caliper:
  blockchain: besu

clients:
  - organization: Org1
    client:
      Besu:
        url: http://127.0.0.1:8545
        chaincode:
          credentials:
            path: ../truffle-project/build/contracts # Path to your smart contract source code
            language: solidity
            contractName: Token # The actual contract name from your .sol file

channels:
  - channelName: mychannel
    contracts:
      - id: credentials
        contractID: Token # This will be the address of your deployed contract. Leave blank for now.

wallets:
